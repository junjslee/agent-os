name: GitHub Clone Count Update Everyday

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: GH Login
        run: echo "${{ secrets.SECRET_TOKEN }}" | gh auth login --with-token

      - name: Parse Latest Clone Count
        run: |
          curl --user "${{ github.actor }}:${{ secrets.SECRET_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/traffic/clones \
          > clone.json

      - name: Create Gist and Download Previous Count
        id: set_id
        run: |
          if gh secret list | grep -q "GIST_ID"
          then
            echo "GIST_ID found"
            GIST_ID_VAL=$(gh secret list | grep GIST_ID | awk '{print $1}') # Safety check for fetching
            echo "GIST=${{ secrets.GIST_ID }}" >> $GITHUB_OUTPUT
            curl -L https://gist.githubusercontent.com/${{ github.actor }}/${{ secrets.GIST_ID }}/raw/clone.json > clone_before.json
            
            if grep -q '404: Not Found' clone_before.json; then
              echo "GIST_ID not valid. Creating another..."
              gist_id=$(gh gist create clone.json | awk -F / '{print $NF}')
              echo $gist_id | gh secret set GIST_ID
              echo "GIST=$gist_id" >> $GITHUB_OUTPUT
              cp clone.json clone_before.json
            fi
          else
            echo "GIST_ID not found. Creating a gist..."
            gist_id=$(gh gist create clone.json | awk -F / '{print $NF}')
            echo $gist_id | gh secret set GIST_ID
            echo "GIST=$gist_id" >> $GITHUB_OUTPUT
            cp clone.json clone_before.json
          fi

      - name: Update clone.json via Script
        run: |
          curl -L https://githubusercontent.com > main.py
          python3 main.py

      - name: Update Gist with Latest Count
        run: |
          content=$(sed -e 's/\\/\\\\/g' -e 's/\t/\\t/g' -e 's/\"/\\"/g' -e 's/\r//g' "clone.json" | sed -E ':a;N;$!ba;s/\r{0,1}\n/\\n/g')
          echo '{"description": "${{ github.repository }} clone statistics", "files": {"clone.json": {"content": "'"$content"'"}}}' > post_clone.json
          curl -s -X PATCH \
          --user "${{ github.actor }}:${{ secrets.SECRET_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d @post_clone.json https://api.github.com/gists/${{ steps.set_id.outputs.GIST }}

      - name: Generate CLONE.md
        run: |
          if [ ! -f CLONE.md ]; then
            shields="https://shields.io"
            url="https://gist.githubusercontent.com/${{ github.actor }}/${{ steps.set_id.outputs.GIST }}/raw/clone.json"
            repo="https://github.com/${{ github.repository }}"
            echo ' **Markdown**' > CLONE.md
            echo '```markdown' >> CLONE.md
            echo "[![GitHub Clones]($shields$url&logo=github)]($repo)" >> CLONE.md
            echo '```' >> CLONE.md
            echo ' **HTML**' >> CLONE.md
            echo '```html' >> CLONE.md
            echo "<a href='$repo'><img alt='GitHub Clones' src='$shields$url&logo=github'></a>" >> CLONE.md
            echo '```' >> CLONE.md
            git config --global user.name "GitHub Action"
            git config --global user.email "action@github.com"
            git add CLONE.md
            git commit -m "create clone count badge"
          fi

      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
