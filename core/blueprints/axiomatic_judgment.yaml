name: axiomatic_judgment
description: >
  Conflicting-source resolution with synthesis escalation. Decision arm
  requires sources+believability_weight, conflict_axis, decision_rule,
  fail_condition_per_source, fallback_if_both_wrong. Synthesis arm
  (conflict_cause, context_signature, synthesized_protocol,
  framework_entry_ref, guidance_trigger) writes context-dependent
  protocol to the Pillar 3 framework for active guidance on future
  matching contexts. Structure-only at CP6; selector + field-level
  validation land in v1.0.1.
version: 1
required_fields:
  - sources
  - conflict_axis
  - decision_rule
  - fail_condition_per_source
  - fallback_if_both_wrong
  - conflict_cause
  - context_signature
  - synthesized_protocol
  - framework_entry_ref
  - guidance_trigger
optional_fields:
  - verification_trace
synthesis_arm: true
verification_trace_required: false
selector_triggers: []
