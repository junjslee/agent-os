<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 456 96" role="img" aria-label="episteme" shape-rendering="crispEdges">
  <title>episteme — candidate C · dragon sigil</title>

  <!--
    Coiled dragon silhouette, pixel grid 20x20 at 4 SVG units per cell.
    Origin (8, 8). Head upper-left, body S-curves down-right, tail curls
    back-left at the bottom. Two-tone so the coil reads at thumbnail.
  -->

  <!-- Primary silhouette (dark indigo) -->
  <g fill="#2E2A6B">
    <!-- Horn/crest -->
    <rect x="36" y="8"  width="8"  height="4"/>

    <!-- Head row band -->
    <rect x="24" y="12" width="28" height="4"/>
    <rect x="20" y="16" width="36" height="4"/>
    <rect x="16" y="20" width="36" height="4"/>
    <rect x="20" y="24" width="28" height="4"/>

    <!-- Neck arching right -->
    <rect x="36" y="28" width="28" height="4"/>
    <rect x="44" y="32" width="32" height="4"/>
    <rect x="52" y="36" width="32" height="4"/>

    <!-- Upper body curve -->
    <rect x="48" y="40" width="40" height="4"/>
    <rect x="40" y="44" width="48" height="4"/>

    <!-- Main body coil (widest) -->
    <rect x="24" y="48" width="64" height="4"/>
    <rect x="16" y="52" width="68" height="4"/>
    <rect x="12" y="56" width="64" height="4"/>
    <rect x="12" y="60" width="56" height="4"/>

    <!-- Body returning inward -->
    <rect x="16" y="64" width="44" height="4"/>
    <rect x="20" y="68" width="32" height="4"/>

    <!-- Tail curling right -->
    <rect x="24" y="72" width="24" height="4"/>
    <rect x="32" y="76" width="20" height="4"/>
    <rect x="40" y="80" width="16" height="4"/>
    <rect x="48" y="84" width="8"  height="4"/>
  </g>

  <!-- Belly / inner coil mid-tone (gives the body dimension) -->
  <g fill="#6B5FB8">
    <rect x="32" y="52" width="16" height="4"/>
    <rect x="28" y="56" width="24" height="4"/>
    <rect x="32" y="60" width="20" height="4"/>
  </g>

  <!-- Eye (warm accent) -->
  <rect x="32" y="18" width="4" height="4" fill="#F8E7A3"/>
  <rect x="33" y="19" width="2" height="2" fill="#1A1740"/>

  <!-- Wordmark -->
  <text x="108" y="70"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="60"
        font-weight="500"
        letter-spacing="-1.5"
        fill="#0a0a0a">episteme</text>
</svg>
