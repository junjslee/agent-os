<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 456 96" role="img" aria-label="episteme" shape-rendering="crispEdges">
  <title>episteme — candidate B · sage with dragonling</title>

  <!-- Hat (dark indigo) — same stepped pyramid as A, rightward tilt at tip -->
  <g fill="#1A1740">
    <rect x="54" y="4"  width="4"  height="4"/>
    <rect x="50" y="8"  width="8"  height="4"/>
    <rect x="46" y="12" width="12" height="4"/>
    <rect x="42" y="16" width="20" height="4"/>
    <rect x="38" y="20" width="28" height="4"/>
    <rect x="34" y="24" width="36" height="4"/>
    <rect x="30" y="28" width="44" height="4"/>
    <rect x="14" y="32" width="76" height="6"/>
  </g>

  <!-- Hood + robe -->
  <g fill="#2E2A6B">
    <rect x="32" y="38" width="40" height="4"/>
    <rect x="30" y="42" width="4"  height="22"/>
    <rect x="70" y="42" width="4"  height="22"/>
    <rect x="18" y="62" width="68" height="8"/>
    <rect x="20" y="70" width="64" height="18"/>
    <rect x="20" y="88" width="18" height="4"/>
    <rect x="66" y="88" width="18" height="4"/>
  </g>

  <!-- Face + beard -->
  <g fill="#D4CEEF">
    <rect x="34" y="42" width="36" height="18"/>
    <rect x="34" y="60" width="36" height="4"/>
    <rect x="36" y="64" width="32" height="4"/>
    <rect x="40" y="68" width="24" height="4"/>
    <rect x="44" y="72" width="16" height="4"/>
    <rect x="48" y="76" width="8"  height="4"/>
  </g>

  <!-- Eyes -->
  <g fill="#1A1740">
    <rect x="40" y="50" width="4" height="4"/>
    <rect x="60" y="50" width="4" height="4"/>
  </g>

  <!--
    Dragonling, summoned — floats at the sage's right.
    Replaces the staff. Coiled S-curve descent.
    Two-tone (dark body + mid-indigo belly) so the coil reads at thumbnail.
  -->
  <g fill="#1A1740">
    <!-- Head: cols 22-24, rows 7-9 (SVG x=88-100, y=28-40) -->
    <rect x="88"  y="28" width="12" height="4"/>  <!-- top of head -->
    <rect x="84"  y="32" width="16" height="4"/>  <!-- full head -->
    <rect x="84"  y="36" width="8"  height="4"/>  <!-- jaw left -->
    <rect x="96"  y="36" width="4"  height="4"/>  <!-- jaw right (eye gap) -->
    <!-- Neck curving right then down -->
    <rect x="92"  y="40" width="12" height="4"/>
    <rect x="96"  y="44" width="12" height="4"/>
    <!-- Body coil: rightward peak -->
    <rect x="96"  y="48" width="12" height="4"/>
    <rect x="92"  y="52" width="16" height="4"/>
    <!-- Curl back left -->
    <rect x="88"  y="56" width="16" height="4"/>
    <rect x="84"  y="60" width="16" height="4"/>
    <rect x="82"  y="64" width="12" height="4"/>
    <!-- Tail curling right -->
    <rect x="86"  y="68" width="12" height="4"/>
    <rect x="92"  y="72" width="12" height="4"/>
    <rect x="96"  y="76" width="8"  height="4"/>
    <rect x="100" y="80" width="4"  height="4"/>
  </g>

  <!-- Dragonling mid-tone belly highlight, gives it form -->
  <g fill="#6B5FB8">
    <rect x="92" y="36" width="4" height="4"/>   <!-- chin mid -->
    <rect x="96" y="52" width="8" height="4"/>   <!-- coil belly right -->
    <rect x="84" y="64" width="6" height="4"/>   <!-- coil belly left -->
  </g>

  <!-- Dragonling eye (warm accent) -->
  <rect x="94" y="32" width="3" height="3" fill="#F8E7A3"/>

  <!-- Sage's outstretched hand summoning the dragonling -->
  <rect x="76" y="58" width="8" height="4" fill="#D4CEEF"/>

  <!-- Wordmark -->
  <text x="118" y="70"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="60"
        font-weight="500"
        letter-spacing="-1.5"
        fill="#0a0a0a">episteme</text>
</svg>
